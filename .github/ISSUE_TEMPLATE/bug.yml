name: Bug report
description: Report a bug
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How to reproduce the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / Screenshots
    validations:
      required: true
  - type: input
    id: taskid
    attributes:
      label: Task_ID (optional)
      placeholder: T-0001

