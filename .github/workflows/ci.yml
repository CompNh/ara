name: CI (Tier-0)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/dist/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/dist/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Setup pnpm 9.x
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec turbo run typecheck --continue --no-daemon

      - name: Lint
        run: pnpm exec turbo run lint --continue --no-daemon

      - name: Build
        run: pnpm exec turbo run build --continue --no-daemon
