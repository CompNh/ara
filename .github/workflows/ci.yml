name: CI (Tier-0)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/dist/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/dist/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) pnpm 먼저 설치 (pnpm/action-setup이 바이너리 세팅)
      - name: Setup pnpm 9.x
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # 2) Node 설정 + pnpm 캐시 (이제 pnpm 바이너리가 존재하므로 cache: 'pnpm' 정상 작동)
      - name: Setup Node 20.x (with pnpm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: 'pnpm'

      # 3) (선택) corepack 활성화 — pnpm/action-setup가 이미 설치했지만, 환경 일관성 위해 유지 가능
      - name: Enable Corepack
        run: corepack enable

      - name: pnpm -v
        run: pnpm -v

      - name: Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec turbo run typecheck --continue --no-daemon

      - name: Lint
        run: pnpm exec turbo run lint --continue --no-daemon

      - name: Build
        run: pnpm exec turbo run build --continue --no-daemon
