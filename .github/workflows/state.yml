name: Update STATE.md

permissions:
  contents: write
  issues: read
  pull-requests: read
  

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # daily UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure templates/STATE.md exists as base
        run: |
          mkdir -p templates
          if [ ! -f templates/STATE.md ]; then
            echo "# PROJECT STATE" > templates/STATE.md
            echo "_First run placeholder_" >> templates/STATE.md
          fi

      - name: WBS/Tasks summary (Python, no deps)
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv

          out = []
          out.append("## WBS / Tasks Summary\n")

          def read_csv_rows(p):
            with open(p, 'r', encoding='utf-8') as f:
              return list(csv.DictReader(f))

          wbs_path = Path("WBS.csv")
          task_path = Path("Tasks.csv")

          if wbs_path.exists():
            wbs_rows = read_csv_rows(wbs_path)
            out.append(f"- WBS rows: {len(wbs_rows)}")
            # 샘플 표시 (컬럼명이 없으면 빈 값으로 처리)
            sample = [{ 'WBS_ID': r.get('WBS_ID',''), 'Name': r.get('Name','') } for r in wbs_rows[:10]]
            out.append(f"- Sample: {sample}")
          else:
            out.append("- `WBS.csv` not found")

          if task_path.exists():
            task_rows = read_csv_rows(task_path)
            out.append(f"- Task rows: {len(task_rows)}")
            counts = {}
            for r in task_rows:
              s = (r.get('Status','') or '').strip()
              counts[s] = counts.get(s, 0) + 1
            if counts:
              out.append("- Task status counts:")
              for k, v in counts.items():
                out.append(f"  - {k or '(blank)'}: {v}")
          else:
            out.append("- `Tasks.csv` not found")

          Path("wbs_summary.md").write_text("\n".join(out), encoding="utf-8")
          print("Wrote wbs_summary.md")
          PY
          
      - name: Open Issues/PRs summary (GitHub Script)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open'
            });
            const openIssues = issues.filter(i => !i.pull_request);
            const openPRs = issues.filter(i => !!i.pull_request);

            let md = [];
            md.push("## GitHub Summary\n");
            md.push(`- Open issues: ${openIssues.length}`);
            md.push(`- Open PRs: ${openPRs.length}\n`);

            md.push("### Recent Open PRs");
            openPRs.slice(0, 10).forEach(pr => {
              md.push(`- #${pr.number} ${pr.title} (@${pr.user.login})`);
            });

            md.push("\n### Recent Open Issues");
            openIssues.slice(0, 10).forEach(is => {
              md.push(`- #${is.number} ${is.title} (@${is.user.login})`);
            });

            fs.writeFileSync('gh_summary.md', md.join('\n'), 'utf8');
            core.info('Wrote gh_summary.md');

      - name: Build STATE.md
        run: |
          echo "# PROJECT STATE" > STATE.md
          echo "" >> STATE.md
          echo "_Last updated: $(date -u)_" >> STATE.md
          echo "" >> STATE.md
          if [ -f templates/ROADMAP.md ]; then
            echo "See [ROADMAP](templates/ROADMAP.md) for long-term plan." >> STATE.md
            echo "" >> STATE.md
          fi
          if [ -f wbs_summary.md ]; then
            cat wbs_summary.md >> STATE.md
            echo "" >> STATE.md
          fi
          if [ -f gh_summary.md ]; then
            cat gh_summary.md >> STATE.md
            echo "" >> STATE.md
          fi

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: "STATE.md"
          message: "chore(state): auto-update STATE.md"
          default_author: github_actions
