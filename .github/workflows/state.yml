name: Update STATE.md

permissions:
  contents: write
  issues: read
  pull-requests: read
  

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # daily UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure templates/STATE.md exists as base
        run: |
          mkdir -p templates
          if [ ! -f templates/STATE.md ]; then
            echo "# PROJECT STATE" > templates/STATE.md
            echo "_First run placeholder_" >> templates/STATE.md
          fi

      - name: WBS/Tasks summary (Python, no deps)
        run: |
          python - <<'PY'
          import csv, os
          def read(p):
              with open(p,'r',encoding='utf-8-sig',newline='') as f:
                  return list(csv.DictReader(f))
          out=[]
          out.append("## WBS / Tasks Summary\n")
          w = read("WBS.csv") if os.path.exists("WBS.csv") else []
          t = read("Tasks.csv") if os.path.exists("Tasks.csv") else []
          out.append(f"- WBS rows: {len(w)}" if w else "- `WBS.csv` not found")
          out.append(f"- Task rows: {len(t)}" if t else "- `Tasks.csv` not found")
          def is_done(s): return (s or '').strip().lower() in {'완료','done','complete'}
          if w and t:
              out.append("\n### Progress by WBS\n")
              out.append("| WBS_ID | Name | Done/Total | Status |")
              out.append("|---|---|---:|---|")
              t_by = {}
              for r in t:
                  t_by.setdefault(r.get('WBS_ID',''), []).append(r)
              for wr in w:
                  wid = wr.get('WBS_ID','')
                  name = wr.get('Name','')
                  lst = t_by.get(wid,[])
                  tot = len(lst)
                  done = sum(1 for r in lst if is_done(r.get('Status')))
                  status = wr.get('Status','')
                  out.append(f"| {wid} | {name} | {done}/{tot} | {status} |")
          open("wbs_summary.md","w",encoding="utf-8").write("\n".join(out))
          PY

          
      - name: Open Issues/PRs summary (GitHub Script)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open'
            });
            const openIssues = issues.filter(i => !i.pull_request);
            const openPRs = issues.filter(i => !!i.pull_request);

            let md = [];
            md.push("## GitHub Summary\n");
            md.push(`- Open issues: ${openIssues.length}`);
            md.push(`- Open PRs: ${openPRs.length}\n`);

            md.push("### Recent Open PRs");
            openPRs.slice(0, 10).forEach(pr => {
              md.push(`- #${pr.number} ${pr.title} (@${pr.user.login})`);
            });

            md.push("\n### Recent Open Issues");
            openIssues.slice(0, 10).forEach(is => {
              md.push(`- #${is.number} ${is.title} (@${is.user.login})`);
            });

            fs.writeFileSync('gh_summary.md', md.join('\n'), 'utf8');
            core.info('Wrote gh_summary.md');

      - name: Build STATE.md
        run: |
          echo "# PROJECT STATE" > STATE.md
          echo "" >> STATE.md
          echo "_Last updated: $(date -u)_" >> STATE.md
          echo "" >> STATE.md
          if [ -f templates/ROADMAP.md ]; then
            echo "See [ROADMAP](templates/ROADMAP.md) for long-term plan." >> STATE.md
            echo "" >> STATE.md
          fi
          if [ -f wbs_summary.md ]; then
            cat wbs_summary.md >> STATE.md
            echo "" >> STATE.md
          fi
          if [ -f gh_summary.md ]; then
            cat gh_summary.md >> STATE.md
            echo "" >> STATE.md
          fi

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: "STATE.md"
          message: "chore(state): auto-update STATE.md"
          default_author: github_actions
