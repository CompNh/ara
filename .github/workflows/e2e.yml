name: e2e
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'pnpm'

      - run: corepack enable
      - run: pnpm -v
      - run: pnpm install --frozen-lockfile

      # 라이브러리 선빌드 (docs 제외)
      - name: Build libs
        run: |
          pnpm -w -r --filter @ara/tokens --filter @ara/theme --filter @ara/react-headless --filter @ara/react build

      # Playwright 브라우저 설치 (한 번만 필요)
      - run: pnpm -w dlx playwright install --with-deps

      # e2e 실행 (webServer는 @ara/docs만 띄움)
      - run: pnpm -w e2e

    env:
      TURBO_TELEMETRY_DISABLED: '1' # (옵션) 텔레메트리 배너 숨김
