name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (20.19) & pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            **/pnpm-lock.yaml

      - name: Enable corepack
        run: corepack enable

      - name: Show pnpm version
        run: pnpm -v

      - name: Install deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm -w test

      - name: Upload coverage (if any)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage/**
            packages/**/coverage/**
          if-no-files-found: ignore
