name: CSV Task Auto-Complete

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  run:
    # 루프 방지: Actions가 푼 커밋이면 스킵
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Extract Task IDs
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const re = /\[T-([0-9A-Za-z\-]+)\s*\/\s*(?:완료|done|complete)\]/gi;
            const ids = new Set();
            for (const c of commits) {
              let m; while ((m = re.exec(c.message))) ids.add(`T-${m[1]}`);
            }
            core.setOutput('task_ids', JSON.stringify([...ids]));

      - name: Show IDs
        run: echo "TASK_IDS=${{ steps.extract.outputs.task_ids }}"

      - name: Update CSVs from IDs (no deps)
        if: ${{ steps.extract.outputs.task_ids != '[]' }}
        env:
          TASK_IDS_JSON: ${{ steps.extract.outputs.task_ids }}
          DONE_LABEL: 완료
        run: |
          python - <<'PY'
          import csv, json, os
          from collections import defaultdict

          task_ids = set(json.loads(os.environ.get("TASK_IDS_JSON","[]")))
          done_label = os.environ.get("DONE_LABEL","완료").strip().lower()
          def is_done(s): return (s or "").strip().lower() in {done_label, "done", "complete"}

          changed_tasks = changed_wbs = False

          # Tasks.csv
          tpath = "Tasks.csv"
          if not os.path.exists(tpath):
              print("Tasks.csv not found; nothing to do."); raise SystemExit(0)
          with open(tpath, "r", encoding="utf-8-sig", newline="") as f:
              rdr = csv.DictReader(f); t_fields = rdr.fieldnames or []; t_rows = list(rdr)
          need = {"Task_ID","WBS_ID","Status"}
          if not need.issubset(set(t_fields)):
              print(f"ERROR: Tasks.csv missing columns: {need - set(t_fields)}"); raise SystemExit(1)

          for r in t_rows:
              if r.get("Task_ID") in task_ids and (r.get("Status") or "").strip().lower() not in {done_label,"done","complete"}:
                  r["Status"] = os.environ.get("DONE_LABEL","완료"); changed_tasks = True

          if changed_tasks:
              with open(tpath, "w", encoding="utf-8", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=t_fields); w.writeheader(); w.writerows(t_rows)
              print("Updated Tasks.csv")

          # WBS.csv
          by_wbs = defaultdict(list)
          for r in t_rows: by_wbs[r.get("WBS_ID","")].append(r)

          wpath = "WBS.csv"
          if os.path.exists(wpath):
              with open(wpath, "r", encoding="utf-8-sig", newline="") as f:
                  rdr = csv.DictReader(f); w_fields = rdr.fieldnames or []; w_rows = list(rdr)
              if "Status" not in w_fields: w_fields += ["Status"]
              for wr in w_rows:
                  wbs_id = wr.get("WBS_ID",""); tasks = by_wbs.get(wbs_id, [])
                  if tasks and all(is_done(r.get("Status")) for r in tasks):
                      if (wr.get("Status") or "").strip().lower() not in {done_label,"done","complete"}:
                          wr["Status"] = os.environ.get("DONE_LABEL","완료"); changed_wbs = True
              if changed_wbs:
                  with open(wpath, "w", encoding="utf-8", newline="") as f:
                      w = csv.DictWriter(f, fieldnames=w_fields); w.writeheader(); w.writerows(w_rows)
                  print("Updated WBS.csv")
          PY

      - name: Commit CSV changes
        if: ${{ steps.extract.outputs.task_ids != '[]' }}
        uses: EndBug/add-and-commit@v9
        with:
          add: "Tasks.csv WBS.csv"
          message: "chore(csv): auto-complete tasks from commit"
          default_author: github_actions
